services:
  api:
    build:
      context: ./backend/api
    container_name: kineo-api
    env_file:
      - ./backend/api/.env.docker
    environment:
      APP_NAME: Kineo Coach API
      APP_ENV: docker
      DEBUG: "true"
      API_PREFIX: /api/v1
      DATABASE_URL: postgresql+psycopg://admin:StrongPassword123!@5.78.42.147:5432/app_db
      JWT_SECRET: docker-dev-secret-key-with-32-plus-chars
    ports:
      - "8010:8000"
    volumes:
      - ./backend/api/app:/app/app
      - ./backend/api/tests:/app/tests
